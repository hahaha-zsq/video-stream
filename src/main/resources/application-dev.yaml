log_path: ${LOG_PATH:/logs}
log_name: video-stream-middleware
spring:
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
temp_path: ${TEMP_PATH:/Users/dadandiaomin/work/temp}
netty-video:
  # 服务端配置
  server:
    # 服务端口
    port: ${NETTY_PORT:4901}
    # 线程池配置
    threadPool:
      core-pool-size: 10
      max-pool-size: 20
      queue-capacity: 100
      keep-alive-seconds: 10
      name-prefix: "nettyAsyncExecutor -"
      await-termination-seconds: 60
      wait-for-tasks-to-complete-on-shutdown: true
video:
  hls:
    # HLS 密钥接口对外访问的基础地址，部署到网关或域名后建议显式配置
    key-base-url: ${VIDEO_HLS_KEY_BASE_URL:http://localhost:${server.port}}
    # 当前 HLS 密钥接口鉴权码，生产环境建议替换为业务侧鉴权方案
    key-auth-code: ${VIDEO_HLS_KEY_AUTH_CODE:secret123}