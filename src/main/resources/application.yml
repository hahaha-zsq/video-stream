server:
  compression:
    enabled: true
    # 配置哪些 MIME 类型的内容会被压缩，默认包括了大部分文本类型
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json
    # 只有当响应体的大小大于或等于这个值（以字节为单位）时才会启用压缩，默认是 2048 字节
    min-response-size: 1024
  port: 4900
spring:
  application:
    name: video-stream-middleware
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
video:
  hls:
    # HLS 密钥接口对外访问的基础地址，部署到网关或域名后建议显式配置
    key-base-url: ${VIDEO_HLS_KEY_BASE_URL:http://localhost:${server.port}}
    # 当前 HLS 密钥接口鉴权码，生产环境建议替换为业务侧鉴权方案
    key-auth-code: ${VIDEO_HLS_KEY_AUTH_CODE:secret123}
